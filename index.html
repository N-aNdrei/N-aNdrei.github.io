<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MDN Cookie Examples</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    section { margin-bottom: 30px; }
    button { margin: 5px; }
    code { display: block; background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h1>🍪 MDN Cookie Examples (1–6)</h1>

<!-- EXAMPLE 1 -->
<section>
<h2>Example 1</h2>
<button id="show1">Show cookies</button>
<button id="clear1">Clear</button>
<code id="output1"></code>
</section>

<!-- EXAMPLE 2 -->
<section>
<h2>Example 2</h2>
<button id="show2">Show cookie value</button>
<button id="clear2">Clear</button>
<code id="output2"></code>
</section>

<!-- EXAMPLE 3 -->
<section>
<h2>Example 3</h2>
<button id="doOnce3">Only do something once</button>
<button id="clear3">Clear</button>
<code id="output3"></code>
</section>

<!-- EXAMPLE 4 -->
<section>
<h2>Example 4</h2>
<button id="reset4">Reset only once cookie</button>
<button id="clear4">Clear</button>
<code id="output4"></code>
</section>

<!-- EXAMPLE 5 -->
<section>
<h2>Example 5</h2>
<button id="check5">Check cookie exists</button>
<button id="clear5">Clear</button>
<code id="output5"></code>
</section>

<!-- EXAMPLE 6 -->
<section>
<h2>Example 6</h2>
<button id="check6">Check cookie value</button>
<button id="clear6">Clear</button>
<code id="output6"></code>
</section>

<script>

/* =====================
   EXAMPLE 1
===================== */
document.cookie = "name=Oeschger";
document.cookie = "favorite_food=tripe";

document.getElementById("show1").onclick = () => {
  document.getElementById("output1").textContent = "> " + document.cookie;
};
document.getElementById("clear1").onclick = () => {
  document.getElementById("output1").textContent = "";
};

/* =====================
   EXAMPLE 2
===================== */
document.cookie = "test1=Hello";
document.cookie = "test2=World";

document.getElementById("show2").onclick = () => {
  const cookieValue = document.cookie
    .split("; ")
    .find(row => row.startsWith("test2="))
    ?.split("=")[1];

  document.getElementById("output2").textContent = "> " + cookieValue;
};
document.getElementById("clear2").onclick = () => {
  document.getElementById("output2").textContent = "";
};

/* =====================
   EXAMPLE 3
===================== */
document.getElementById("doOnce3").onclick = () => {
  if (!document.cookie.split("; ").find(row => row.startsWith("doSomethingOnlyOnce"))) {
    document.cookie = "doSomethingOnlyOnce=true; expires=Fri, 31 Dec 9999 23:59:59 GMT";
    document.getElementById("output3").textContent = "> Do something here!";
  }
};
document.getElementById("clear3").onclick = () => {
  document.getElementById("output3").textContent = "";
};

/* =====================
   EXAMPLE 4
===================== */
document.getElementById("reset4").onclick = () => {
  document.cookie = "doSomethingOnlyOnce=; expires=Thu, 01 Jan 1970 00:00:00 GMT";
  document.getElementById("output4").textContent = "> Reset!";
};
document.getElementById("clear4").onclick = () => {
  document.getElementById("output4").textContent = "";
};

/* =====================
   EXAMPLE 5
===================== */
document.cookie = "reader=1";

document.getElementById("check5").onclick = () => {
  if (document.cookie.split(";").some(item => item.trim().startsWith("reader="))) {
    document.getElementById("output5").textContent = '> The cookie "reader" exists';
  } else {
    document.getElementById("output5").textContent = '> The cookie "reader" does not exist';
  }
};
document.getElementById("clear5").onclick = () => {
  document.getElementById("output5").textContent = "";
};

/* =====================
   EXAMPLE 6
===================== */
document.getElementById("check6").onclick = () => {
  if (document.cookie.split(";").some(item => item.includes("reader=1"))) {
    document.getElementById("output6").textContent = '> The cookie "reader" has value 1';
  }
};
document.getElementById("clear6").onclick = () => {
  document.getElementById("output6").textContent = "";
};

</script>

</body>
</html>
