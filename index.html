<head>
  <meta charset="UTF-8">
  <title>Cookie Examples</title>
</head>
<body>

<h1>Cookie Examples</h1>

<!-- EXAMPLE 1 -->
<h2>Example 1</h2>
<button id="show1">Show cookies</button>
<button id="clear1">Clear</button>
<div>
  <code id="output1"></code>
</div>


<!-- EXAMPLE 2 -->
<h2>Example 2</h2>
<button id="show2">Show cookie value</button>
<button id="clear2">Clear</button>
<div>
  <code id="output2></code>
</div>

<!-- EXAMPLE 3 -->
<h2>Example 3</h2>
<button id="do-once3">Only once</button>
<button id="clear3">Clear</button>
<div>
  <code id="output3"></code>
</div>

<!-- EXAMPLE 4 -->
<h2>Example 4</h2>
<button id="reset4">Reset</button>
<button id="clear4">Clear</button>
<div>
  <code id="output4"></code>
</div>

<!-- EXAMPLE 5 -->
<h2>Example 5</h2>
<button id="check5">Check exists</button>
<button id="clear5">Clear</button>
<div>
  <code id="output5"></code>
</div>

<!-- EXAMPLE 6 -->
<h2>Example 6</h2>
<button id="check6">Check value</button>
<button id="clear6">Clear</button>
<div>
  <code id="output6"></code>
</div>

<script>

/* =====================
   EXAMPLE 1
===================== */
const showBtn1 = document.getElementById("show1");
const clearBtn1 = document.getElementById("clear1");
const output1 = document.getElementById("output1");

document.cookie = "name=Oeschger; SameSite=None; Secure";
document.cookie = "favorite_food=tripe; SameSite=None; Secure";

showBtn1.addEventListener("click", () => {
  output1.textContent = `> ${document.cookie}`;
});
clearBtn1.addEventListener("click", () => {
  output1.textContent = "";
});

/* =====================
   EXAMPLE 2
===================== */
const showBtn2 = document.getElementById("show2");
const clearBtn2 = document.getElementById("clear2");
const output2 = document.getElementById("output2");

document.cookie = "test1=Hello; SameSite=None; Secure";
document.cookie = "test2=World; SameSite=None; Secure";

showBtn2.addEventListener("click", () => {
  const cookieValue = document.cookie
    .split("; ")
    .find((row) => row.startsWith("test2="))
    ?.split("=")[1];

  output2.textContent = `> ${cookieValue}`;
});
clearBtn2.addEventListener("click", () => {
  output2.textContent = "";
});

/* =====================
   EXAMPLE 3
===================== */
const doOnceBtn3 = document.getElementById("do-once3");
const clearBtn3 = document.getElementById("clear3");
const output3 = document.getElementById("output3");

doOnceBtn3.addEventListener("click", () => {
  if (!document.cookie
      .split("; ")
      .find(row => row.startsWith("doSomethingOnlyOnce"))) {
    document.cookie = "doSomethingOnlyOnce=true; expires=Fri, 31 Dec 9999 23:59:59 GMT";
    output3.textContent = "> Do something here!";
  }
});
clearBtn3.addEventListener("click", () => {
  output3.textContent = "";
});

/* =====================
   EXAMPLE 4
===================== */
const resetBtn4 = document.getElementById("reset4");
const clearBtn4 = document.getElementById("clear4");
const output4 = document.getElementById("output4");

resetBtn4.addEventListener("click", () => {
  document.cookie = "doSomethingOnlyOnce=; expires=Thu, 01 Jan 1970 00:00:00 GMT";
  output4.textContent = "> Reset!";
});
clearBtn4.addEventListener("click", () => {
  output4.textContent = "";
});

/* =====================
   EXAMPLE 5
===================== */
const checkBtn5 = document.getElementById("check5");
const clearBtn5 = document.getElementById("clear5");
const output5 = document.getElementById("output5");

document.cookie = "reader=1";

checkBtn5.addEventListener("click", () => {
  if (document.cookie.split(";").some(item => item.trim().startsWith("reader="))) {
    output5.textContent = '> The cookie "reader" exists';
  } else {
    output5.textContent = '> The cookie "reader" does not exist';
  }
});
clearBtn5.addEventListener("click", () => {
  output5.textContent = "";
});

/* =====================
   EXAMPLE 6
===================== */
const checkBtn6 = document.getElementById("check6");
const clearBtn6 = document.getElementById("clear6");
const output6 = document.getElementById("output6");

checkBtn6.addEventListener("click", () => {
  if (document.cookie.split(";").some(item => item.includes("reader=1"))) {
    output6.textContent = '> The cookie "reader" has a value of "1"';
  }
});
clearBtn6.addEventListener("click", () => {
  output6.textContent = "";
});

</script>

</body>
</html>
